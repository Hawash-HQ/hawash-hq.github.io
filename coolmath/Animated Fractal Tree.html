<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Animated Fractal Tree</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let angle = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function drawBranch(x, y, size, angleOffset, depth) {
            if (depth === 0) return;

            // حساب الإحداثيات
            const x2 = x + size * Math.cos(angleOffset);
            const y2 = y + size * Math.sin(angleOffset);

            // رسم الخط
            ctx.strokeStyle = `hsl(${200 + depth * 20}, 70%, 60%)`;
            ctx.lineWidth = depth;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            // العودية (Recursion) لعمل التفرعات
            drawBranch(x2, y2, size * 0.7, angleOffset - Math.sin(angle) * 0.5, depth - 1);
            drawBranch(x2, y2, size * 0.7, angleOffset + Math.cos(angle) * 0.5, depth - 1);
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // بداية الشجرة من منتصف أسفل الشاشة
            drawBranch(width / 2, height - 50, 150, -Math.PI / 2, 9);
            
            angle += 0.02;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
