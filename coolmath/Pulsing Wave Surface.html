<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Pulsing Wave Surface</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas3d"></canvas>

    <script>
        const canvas = document.getElementById('canvas3d');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let time = 0;
        const size = 30; // كثافة الشبكة
        const spacing = 40;

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            for (let i = -size; i < size; i++) {
                for (let j = -size; j < size; j++) {
                    const x = i * spacing;
                    const y = j * spacing;
                    
                    // حساب المسافة من المركز لعمل تأثير الموجة
                    const dist = Math.sqrt(i*i + j*j);
                    
                    // دالة الموجة
                    const z = Math.sin(dist * 0.3 - time) * 50;
                    
                    // إسقاط بسيط (Perspective)
                    const perspective = 400 / (400 + z);
                    const screenX = x * perspective + cx;
                    const screenY = y * perspective + cy;
                    
                    // تغيير اللون بناءً على الارتفاع
                    const hue = (dist * 5 + time * 50) % 360;
                    ctx.fillStyle = `hsl(${hue}, 80%, 60%)`;
                    
                    // رسم النقطة
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, perspective * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            time += 0.1;
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
